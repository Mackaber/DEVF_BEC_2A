<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Social Async</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <div>
      <h1>Red Social Async Demo</h1>
      <p>Comparación de Callbacks, Promises y Async/Await con 3 llamadas simuladas.</p>
    </div>
    <div class="mode-buttons">
      <button id="run-callbacks">Callbacks</button>
      <button id="run-promises">Promises</button>
      <button id="run-async-await">Async/Await</button>
    </div>
  </header>

  <section class="controls">
    <h2>Simular errores</h2>
    <label>
      <input type="checkbox" id="fail-left" />
      Fallar llamada de Left Sidebar
    </label>
    <label>
      <input type="checkbox" id="fail-main" />
      Fallar llamada de Main Content
    </label>
    <label>
      <input type="checkbox" id="fail-right" />
      Fallar llamada de Right Ads
    </label>
    <p id="run-status">Selecciona un modo para comenzar.</p>
  </section>

  <main class="layout-grid">
    <aside class="column-card" id="left-sidebar">
      <h3>Left Sidebar</h3>
      <div class="section-content" id="left-content"></div>
    </aside>

    <section class="column-card" id="main-content">
      <h3>Main Content</h3>
      <div class="section-content" id="main-posts"></div>
    </section>

    <aside class="column-card" id="right-ads">
      <h3>Right Ads</h3>
      <div class="section-content" id="right-content"></div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>

</html>
